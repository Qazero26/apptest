<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <!-- Google Fonts: Outfit for modern, premium look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --primary-hover-gradient: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
      --input-bg: rgba(15, 23, 42, 0.6);
      --input-focus-border: #818cf8;
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --success-color: #34d399;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Navigation Header */
    header {
      width: 100%;
      max-width: 480px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(10px);
      padding: 16px 24px;
      border-radius: 16px;
      border: 1px solid var(--card-border);
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 700;
      font-size: 1.15rem;
    }

    .logo-link svg {
      width: 24px;
      height: 24px;
      stroke: #a855f7;
      stroke-width: 2;
    }

    nav {
      display: flex;
      gap: 16px;
    }

    nav a {
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav a:hover, nav a.active {
      color: var(--text-primary);
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .form-content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ffffff 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.025em;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 32px;
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-primary);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input, textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    /* Character counter styling */
    .char-counter {
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    button {
      width: 100%;
      background: var(--primary-gradient);
      border: none;
      border-radius: 12px;
      padding: 16px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background: var(--primary-hover-gradient);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    #msg {
      margin-top: 24px;
      text-align: center;
      font-size: 1rem;
      font-weight: 500;
      color: var(--success-color);
      min-height: 24px;
      transition: opacity 0.3s ease;
      opacity: 0;
    }

    #msg.show {
      opacity: 1;
      animation: fadeInUp 0.4s ease forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Loading spinner animation */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      body {
        padding: 20px 10px;
      }
      .container {
        padding: 30px 20px;
      }
      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo-link">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="24" height="24">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span>Hub</span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="form.html" class="active">Contact Form</a>
      <a href="view.html">Submissions</a>
    </nav>
  </header>

  <div class="container">
    <div class="form-content">
      <h1>Contact us</h1>
      <p class="subtitle">Drop us a line and we'll get back to you shortly.</p>
      
      <form id="contactForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="john@example.com">
        </div>
        
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required placeholder="Your message here..." maxlength="1000"></textarea>
          <div class="char-counter" id="charCounter">0 / 1000 characters</div>
        </div>
        
        <button type="submit" id="submitBtn">
          <span>Send Message</span>
          <span class="spinner" id="spinner"></span>
        </button>
      </form>
      
      <p id="msg"></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const msgElement = document.getElementById('msg');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = submitBtn.querySelector('span');
    const messageInput = document.getElementById('message');
    const charCounter = document.getElementById('charCounter');

    const URL = "https://script.google.com/macros/s/AKfycbwtS3A0wSZ6DSfwVwXnCvg3quKIDAzuW9RJcOlsyElKxv4m3Gv7bGBOuUd-BwQg8IOe/exec";

    // Character counter logic
    messageInput.addEventListener('input', () => {
      const length = messageInput.value.length;
      charCounter.textContent = `${length} / 1000 characters`;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Visual feedback: disable button, show spinner
      submitBtn.disabled = true;
      btnText.textContent = "Sending...";
      spinner.style.display = "block";
      msgElement.classList.remove('show');
      msgElement.textContent = "";

      const formData = new FormData(form);
      const data = {
        name: formData.get('name'),
        email: formData.get('email'),
        message: formData.get('message')
      };

      try {
        await fetch(URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(data)
        });

        // Show success message
        msgElement.textContent = "Thanks! We'll get back to you.";
        msgElement.classList.add('show');
        
        // Reset the form & counter
        form.reset();
        charCounter.textContent = "0 / 1000 characters";
      } catch (error) {
        console.error("Submission error:", error);
        msgElement.textContent = "Something went wrong. Please try again.";
        msgElement.style.color = "#f87171"; // Red accent on error
        msgElement.classList.add('show');
      } finally {
        // Restore button state
        submitBtn.disabled = false;
        btnText.textContent = "Send Message";
        spinner.style.display = "none";
      }
    });
  </script>
</body>
</html>
