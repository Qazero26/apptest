<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Submissions Hub</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --primary-hover-gradient: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
      --input-bg: rgba(15, 23, 42, 0.6);
      --input-focus-border: #818cf8;
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --error-color: #f87171;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ffffff 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.025em;
      text-align: center;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 32px;
      font-weight: 300;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-primary);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    input:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    button {
      width: 100%;
      background: var(--primary-gradient);
      border: none;
      border-radius: 12px;
      padding: 16px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    button:hover {
      background: var(--primary-hover-gradient);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    #msg {
      margin-top: 20px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--error-color);
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #msg.show {
      opacity: 1;
      animation: fadeInUp 0.4s ease forwards;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <h1>Sign in</h1>
      <p class="subtitle">Access the Submissions Dashboard</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required placeholder="Enter username">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter password">
        </div>
        
        <button type="submit" id="submitBtn">
          <span>Sign in</span>
          <span class="spinner" id="spinner"></span>
        </button>
      </form>
      
      <p id="msg"></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const msgElement = document.getElementById('msg');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = submitBtn.querySelector('span');

    const URL = "https://script.google.com/macros/s/AKfycbwtS3A0wSZ6DSfwVwXnCvg3quKIDAzuW9RJcOlsyElKxv4m3Gv7bGBOuUd-BwQg8IOe/exec";

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      submitBtn.disabled = true;
      btnText.textContent = "Signing in...";
      spinner.style.display = "block";
      msgElement.classList.remove('show');
      msgElement.textContent = "";

      try {
        const params = new URLSearchParams({
          action: "login",
          username: form.username.value,
          password: form.password.value
        });
        const res = await fetch(URL + "?" + params.toString());
        const data = await res.json();

        if (data.ok) {
          localStorage.setItem("token", data.token);
          window.location.href = "view.html";
        } else {
          msgElement.textContent = data.error || "Wrong credentials";
          msgElement.classList.add('show');
        }
      } catch (error) {
        console.error("Login error:", error);
        msgElement.textContent = "Network error. Please try again later.";
        msgElement.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        btnText.textContent = "Sign in";
        spinner.style.display = "none";
      }
    });
  </script>
</body>
</html>
