<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submissions</title>
  <!-- Google Fonts: Outfit for modern, premium look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --input-bg: rgba(15, 23, 42, 0.6);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --item-bg: rgba(15, 23, 42, 0.4);
      --item-border: rgba(255, 255, 255, 0.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      overflow-y: auto;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      position: relative;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #ffffff 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.025em;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    li {
      background: var(--item-bg);
      border: 1px solid var(--item-border);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeInUp 0.4s ease forwards;
    }

    li:hover {
      border-color: rgba(99, 102, 241, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }

    .header-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .user-info {
      font-size: 1rem;
    }

    .name {
      font-weight: 600;
      color: #f8fafc;
    }

    .email {
      color: var(--text-secondary);
      font-weight: 300;
      margin-left: 6px;
      font-size: 0.9rem;
    }

    .message {
      color: #cbd5e1;
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .date {
      font-size: 0.8rem;
      color: #64748b;
      font-weight: 400;
    }

    .status-msg {
      text-align: center;
      padding: 40px 0;
      color: var(--text-secondary);
      font-size: 1.1rem;
      font-weight: 300;
    }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
      gap: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #818cf8;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      body {
        padding: 20px 10px;
      }
      .container {
        padding: 30px 20px;
      }
      h1 {
        font-size: 1.8rem;
      }
      .header-info {
        flex-direction: column;
        gap: 4px;
      }
      .email {
        margin-left: 0;
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>All submissions</h1>
    <div id="status" class="loader">
      <div class="spinner"></div>
      <p>Loading submissions...</p>
    </div>
    <ul id="list" style="display: none;"></ul>
  </div>

  <script>
    const listElement = document.getElementById('list');
    const statusElement = document.getElementById('status');
    const URL = "https://script.google.com/macros/s/AKfycbwtS3A0wSZ6DSfwVwXnCvg3quKIDAzuW9RJcOlsyElKxv4m3Gv7bGBOuUd-BwQg8IOe/exec";

    function formatDate(dateString) {
      if (!dateString) return '';
      try {
        const d = new Date(dateString);
        if (isNaN(d.getTime())) return dateString;
        return d.toLocaleDateString(undefined, { 
          year: 'numeric', 
          month: 'short', 
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      } catch (e) {
        return dateString;
      }
    }

    async function loadSubmissions() {
      try {
        const res = await fetch(URL);
        const data = await res.json();

        if (data && data.ok && Array.isArray(data.contacts)) {
          const contacts = data.contacts;
          statusElement.style.display = "none";
          
          if (contacts.length === 0) {
            statusElement.innerHTML = `<p class="status-msg">No submissions yet</p>`;
            statusElement.style.display = "block";
            return;
          }

          listElement.innerHTML = "";
          contacts.forEach(contact => {
            const li = document.createElement('li');
            
            li.innerHTML = `
              <div class="header-info">
                <div class="user-info">
                  <span class="name">${escapeHTML(contact.name)}</span>
                  <span class="email">(${escapeHTML(contact.email)})</span>
                </div>
                <span class="date">${escapeHTML(formatDate(contact.created_at || contact.date))}</span>
              </div>
              <p class="message">${escapeHTML(contact.message)}</p>
            `;
            listElement.appendChild(li);
          });
          listElement.style.display = "flex";
        } else {
          showError();
        }
      } catch (error) {
        console.error("Fetch error:", error);
        showError();
      }
    }

    function showError() {
      statusElement.innerHTML = `<p class="status-msg">Couldn't load — try again later</p>`;
      statusElement.style.display = "block";
    }

    function escapeHTML(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // Load on start
    loadSubmissions();
  </script>
</body>
</html>
